Summary: Social app for university students
Description: |-
  Poziomki helps university students meet through shared interests and nearby events.

  Core features:

  * profiles and privacy controls
  * recommendations based on shared interests
  * local event creation and discovery
  * direct messaging
  * account export and deletion

  Public policy pages:

  * privacy policy: https://poziomki.app/privacy
  * terms and moderation rules: https://poziomki.app/terms
