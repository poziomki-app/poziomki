services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loco}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-poziomki-rs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loco} -d ${POSTGRES_DB:-poziomki-rs}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 1g
    tmpfs:
      - /tmp
      - /run

  tuwunel:
    image: jevolk/tuwunel:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:6167:6167"
    environment:
      TUWUNEL_SERVER_NAME: "chat.poziomki.app"
      TUWUNEL_PORT: "6167"
      TUWUNEL_ADDRESS: "0.0.0.0"
      TUWUNEL_DATABASE_PATH: "/var/lib/tuwunel"
      TUWUNEL_ALLOW_REGISTRATION: "true"
      TUWUNEL_REGISTRATION_TOKEN: "${MATRIX_REGISTRATION_TOKEN:-poziomki-prod-token}"
      TUWUNEL_ALLOW_FEDERATION: "false"
      TUWUNEL_CREATE_ADMIN_ROOM: "true"
      TUWUNEL_GRANT_ADMIN_TO_FIRST_USER: "true"
      TUWUNEL_LOG: "warn"
    volumes:
      - tuwunel_data:/var/lib/tuwunel
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      tuwunel:
        condition: service_started
    ports:
      - "127.0.0.1:5150:5150"
    environment:
      NODE_ENV: production
      PORT: 5150
      SERVER_BINDING: 0.0.0.0
      SERVER_HOST: ${SERVER_HOST:-https://rs.poziomki.app}
      DATABASE_URL: postgres://${POSTGRES_USER:-loco}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-poziomki-rs}
      JWT_SECRET: ${JWT_SECRET}
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_BUCKET: ${GARAGE_S3_BUCKET:-poziomki-uploads}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      GARAGE_S3_REGION: ${GARAGE_S3_REGION:-us-east-1}
      GARAGE_S3_URL_EXPIRY: ${GARAGE_S3_URL_EXPIRY:-3600}
      GARAGE_S3_PUBLIC_URL: ${GARAGE_S3_PUBLIC_URL:-https://rs-cdn.poziomki.app}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-gmail.com}
      MATRIX_HOMESERVER_URL: ${MATRIX_HOMESERVER_URL:-http://tuwunel:6167}
      MATRIX_HOMESERVER_PUBLIC_URL: ${MATRIX_HOMESERVER_PUBLIC_URL:-}
      MATRIX_PASSWORD_PEPPER: ${MATRIX_PASSWORD_PEPPER:-}
      MATRIX_REGISTRATION_TOKEN: ${MATRIX_REGISTRATION_TOKEN:-}
      OTP_BYPASS_ENABLED: ${OTP_BYPASS_ENABLED:-}
      OTP_BYPASS_CODE: ${OTP_BYPASS_CODE:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5150/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m

  garage:
    image: dxflrs/garage:v1.1.0
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3903:3903"
    environment:
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "true"
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml:ro,z
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data:
  garage_data:
  garage_meta:
  tuwunel_data:
