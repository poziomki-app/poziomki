x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  postgres:
    image: postgres:18-alpine
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-poziomki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-poziomki}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ops/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poziomki} -d ${POSTGRES_DB:-poziomki}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
          pids: 128
    tmpfs:
      - /tmp
      - /run
      - /var/run/postgresql:uid=999,gid=999
    logging: *default-logging
    networks: [db]

  pgdog:
    image: ghcr.io/pgdogdev/pgdog:v0.1.37
    entrypoint: ["/bin/sh", "/opt/pgdog/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:6432:6432"
      - "127.0.0.1:9187:9187"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-poziomki}
      DB_USER: ${POSTGRES_USER:-poziomki}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      API_DB_USER: ${POSTGRES_API_USER:-poziomki_api}
      API_DB_PASSWORD: ${POSTGRES_API_PASSWORD:-}
      WORKER_DB_USER: ${POSTGRES_WORKER_USER:-poziomki_worker}
      WORKER_DB_PASSWORD: ${POSTGRES_WORKER_PASSWORD:-}
      DEFAULT_POOL_SIZE: ${PGDOG_POOL_SIZE:-20}
      POOL_MODE: transaction
      LISTEN_PORT: 6432
      HEALTHCHECK_PORT: 6433
      OPENMETRICS_PORT: 9187
    volumes:
      - ./ops/pgdog/entrypoint.sh:/opt/pgdog/entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6433' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.5'
          pids: 32
    logging: *default-logging
    networks: [db, app]

  api:
    image: ${BACKEND_DIGEST:?BACKEND_DIGEST must be set (bumped by deploy CI)}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pgdog:
        condition: service_healthy
    ports:
      - "127.0.0.1:5150:5150"
      - "127.0.0.1:9092:9092"
    environment:
      RUST_ENV: production
      PORT: 5150
      METRICS_PORT: 9092
      SERVER_BINDING: 0.0.0.0
      SERVER_HOST: ${SERVER_HOST:-https://api.poziomki.app}
      # Owner URL used ONLY for migrations (schema changes need the owner role).
      DATABASE_URL: postgres://${POSTGRES_USER:-poziomki}:${POSTGRES_PASSWORD}@pgdog:6432/${POSTGRES_DB:-poziomki}
      # Least-privilege URL the API pool connects as (role poziomki_api,
      # NOBYPASSRLS). Required in production — startup fails if unset, and
      # the API asserts current_user = 'poziomki_api' after connecting so a
      # misrouted pool can't silently bypass RLS. Bootstrap roles first via
      # infra/ops/postgres/setup-roles.sh.
      API_DATABASE_URL: ${API_DATABASE_URL:?API_DATABASE_URL must be set (least-privilege pool URL)}
      DB_POOL_MAX_SIZE: ${API_DB_POOL_MAX_SIZE:-16}
      DB_POOL_WAIT_TIMEOUT_MS: ${API_DB_POOL_WAIT_TIMEOUT_MS:-3000}
      DB_POOL_CREATE_TIMEOUT_MS: ${API_DB_POOL_CREATE_TIMEOUT_MS:-5000}
      DB_POOL_RECYCLE_TIMEOUT_MS: ${API_DB_POOL_RECYCLE_TIMEOUT_MS:-5000}
      JWT_SECRET: ${JWT_SECRET}
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_BUCKET: ${GARAGE_S3_BUCKET:-poziomki-uploads}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      GARAGE_S3_REGION: ${GARAGE_S3_REGION:-garage}
      GARAGE_S3_URL_EXPIRY: ${GARAGE_S3_URL_EXPIRY:-3600}
      GARAGE_S3_PUBLIC_URL: ${GARAGE_S3_PUBLIC_URL:-https://cdn.poziomki.app}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-*}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.poziomki.app}
      SMTP_ENABLE: ${SMTP_ENABLE:-true}
      SMTP_FROM: ${SMTP_FROM:-noreply@poziomki.app}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-poziomki <noreply@send.poziomki.app>}
      OPS_STATUS_TOKEN: ${OPS_STATUS_TOKEN:-}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      IMGPROXY_HMAC_KEY: ${IMGPROXY_HMAC_KEY}
      IMGPROXY_HMAC_SALT: ${IMGPROXY_HMAC_SALT}
      IMGPROXY_BASE_URL: ${IMGPROXY_BASE_URL:-}
      IMGPROXY_URL_EXPIRY_SECS: ${IMGPROXY_URL_EXPIRY_SECS:-120}
      # Moderation model dir, mounted read-only below. Unset → moderation
      # disabled (handlers pass through, dispatch worker no-ops).
      MODERATION_MODEL_PATH: ${MODERATION_MODEL_PATH-/app/moderation}
      MODERATION_THREADS: ${MODERATION_THREADS:-1}
      # Strict mode in prod: if the model mount is missing the process
      # fails to boot instead of silently accepting everything. Override
      # to `false` only for a deliberate unmoderated rollout.
      MODERATION_REQUIRED: ${MODERATION_REQUIRED:-true}
      OSRM_URL: ${OSRM_URL:-http://osrm-foot:5000}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}
    volumes:
      - ./ops/moderation/bielik-guard-onnx:/app/moderation:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/poziomki_backend-cli", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          # 768 MB to accommodate the moderation engine: ~370 MB steady-state
          # RSS (int8 Bielik-Guard model + ORT arenas) on top of the Axum
          # app baseline (~150 MB). Validated via podman cgroup v2 runs of
          # the moderation-stress bench — OOM reproducible at <=320 MB, so
          # the previous 512 MB would have been borderline once moderation
          # loaded. See scripts/guard-bench/Dockerfile.bench.
          memory: 768m
          cpus: '3.0'
          pids: 256
    logging: *default-logging
    networks: [app]

  worker:
    image: ${BACKEND_DIGEST:?BACKEND_DIGEST must be set (bumped by deploy CI)}
    entrypoint: ["/usr/local/bin/worker"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      pgdog:
        condition: service_healthy
    environment:
      RUST_ENV: production
      METRICS_PORT: 9093
      SERVER_HOST: ${SERVER_HOST:-https://api.poziomki.app}
      # Owner URL used ONLY for migrations (worker also runs pending migrations
      # on boot via build_app_context).
      DATABASE_URL: postgres://${POSTGRES_USER:-poziomki}:${POSTGRES_PASSWORD}@pgdog:6432/${POSTGRES_DB:-poziomki}
      # Worker pool URL (role poziomki_worker, BYPASSRLS — outbox dispatch
      # and cleanup legitimately act across users). Required in production;
      # startup asserts current_user = 'poziomki_worker'. Bootstrap roles
      # first via infra/ops/postgres/setup-roles.sh.
      WORKER_DATABASE_URL: ${WORKER_DATABASE_URL:?WORKER_DATABASE_URL must be set (least-privilege pool URL)}
      DB_POOL_MAX_SIZE: ${WORKER_DB_POOL_MAX_SIZE:-8}
      DB_POOL_WAIT_TIMEOUT_MS: ${WORKER_DB_POOL_WAIT_TIMEOUT_MS:-3000}
      DB_POOL_CREATE_TIMEOUT_MS: ${WORKER_DB_POOL_CREATE_TIMEOUT_MS:-5000}
      DB_POOL_RECYCLE_TIMEOUT_MS: ${WORKER_DB_POOL_RECYCLE_TIMEOUT_MS:-5000}
      JWT_SECRET: ${JWT_SECRET}
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_BUCKET: ${GARAGE_S3_BUCKET:-poziomki-uploads}
      GARAGE_S3_ACCESS_KEY: ${GARAGE_S3_ACCESS_KEY}
      GARAGE_S3_SECRET_KEY: ${GARAGE_S3_SECRET_KEY}
      GARAGE_S3_REGION: ${GARAGE_S3_REGION:-garage}
      GARAGE_S3_URL_EXPIRY: ${GARAGE_S3_URL_EXPIRY:-3600}
      GARAGE_S3_PUBLIC_URL: ${GARAGE_S3_PUBLIC_URL:-https://cdn.poziomki.app}
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN:-*}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.poziomki.app}
      SMTP_ENABLE: ${SMTP_ENABLE:-true}
      SMTP_FROM: ${SMTP_FROM:-noreply@poziomki.app}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-poziomki <noreply@send.poziomki.app>}
      DKIM_DOMAIN: ${DKIM_DOMAIN:-poziomki.app}
      DKIM_SELECTOR: ${DKIM_SELECTOR:-mail}
      DKIM_PRIVATE_KEY_PATH: /etc/dkim/private.key
      IMGPROXY_HMAC_KEY: ${IMGPROXY_HMAC_KEY}
      IMGPROXY_HMAC_SALT: ${IMGPROXY_HMAC_SALT}
      IMGPROXY_BASE_URL: ${IMGPROXY_BASE_URL:-}
      IMGPROXY_URL_EXPIRY_SECS: ${IMGPROXY_URL_EXPIRY_SECS:-120}
      # Async chat-message moderation (outbox topic `moderation_scan`) runs
      # here. Path matches the model baked into backend/Dockerfile.
      MODERATION_MODEL_PATH: ${MODERATION_MODEL_PATH-/app/moderation}
      MODERATION_THREADS: ${MODERATION_THREADS:-1}
      # Strict mode in prod: if the model mount is missing the process
      # fails to boot instead of silently accepting everything. Override
      # to `false` only for a deliberate unmoderated rollout.
      MODERATION_REQUIRED: ${MODERATION_REQUIRED:-true}
    volumes:
      - ./ops/dkim/private.key:/etc/dkim/private.key:ro
      - ./ops/moderation/bielik-guard-onnx:/app/moderation:ro
    healthcheck:
      test: ["CMD", "/usr/local/bin/worker", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    read_only: true
    ports:
      - "127.0.0.1:9093:9093"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          # 512 MB to fit the moderation engine (~370 MB) plus worker
          # baseline. Validated via podman cgroup v2: hard OOM at 256 MB
          # during model load (exit 137), minimum safe is 384 MB with no
          # file-cache thrashing.
          memory: 512m
          cpus: '0.5'
          pids: 512
    logging: *default-logging
    networks: [app]

  imgproxy:
    build:
      context: ../imgproxy
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      garage:
        condition: service_started
    ports:
      - "127.0.0.1:3080:3080"
      - "127.0.0.1:9091:9091"
    environment:
      IMGPROXY_PORT: 3080
      IMGPROXY_BIND_ADDRESS: 0.0.0.0
      IMGPROXY_HMAC_KEY: ${IMGPROXY_HMAC_KEY}
      IMGPROXY_HMAC_SALT: ${IMGPROXY_HMAC_SALT}
      IMGPROXY_CACHE_BYTES: ${IMGPROXY_CACHE_BYTES:-67108864}
      IMGPROXY_MAX_CONCURRENT: ${IMGPROXY_MAX_CONCURRENT:-2}
      IMGPROXY_ALLOWED_PREFIX: ${IMGPROXY_ALLOWED_PREFIX:-}
      GARAGE_S3_ENDPOINT: http://garage:3900
      GARAGE_S3_BUCKET: ${GARAGE_S3_BUCKET:-poziomki-uploads}
      GARAGE_S3_ACCESS_KEY: ${IMGPROXY_S3_ACCESS_KEY:-${GARAGE_S3_ACCESS_KEY}}
      GARAGE_S3_SECRET_KEY: ${IMGPROXY_S3_SECRET_KEY:-${GARAGE_S3_SECRET_KEY}}
      GARAGE_S3_REGION: ${GARAGE_S3_REGION:-garage}
      IMGPROXY_PURGE_SECRET: ${IMGPROXY_PURGE_SECRET:-}
      IMGPROXY_ORIGIN_SECRET: ${IMGPROXY_ORIGIN_SECRET:?IMGPROXY_ORIGIN_SECRET must be set}
      IMGPROXY_SOURCE_URL_ENCRYPTION_KEY: ${IMGPROXY_SOURCE_URL_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
          pids: 64
    logging: *default-logging
    networks: [app]

  garage:
    image: dxflrs/garage:v1.3.1
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "127.0.0.1:3900:3900"
      - "127.0.0.1:3903:3903"
    environment:
      GARAGE_ALLOW_WORLD_READABLE_SECRETS: "false"
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage/garage.toml:/etc/garage.toml:ro,z
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
          pids: 128
    logging: *default-logging
    networks: [app]

volumes:
  postgres_data:
  garage_data:
  garage_meta:

networks:
  db:
    internal: true
  app:
    driver: bridge
