# Tuned for 1GB container, pooler-fronted (max 30 backends)
listen_addresses = '*'
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB
effective_cache_size = 512MB
max_connections = 30
wal_buffers = 4MB

# Logging (minimal for prod)
log_min_duration_statement = 500
log_checkpoints = on
