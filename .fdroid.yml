Summary: Social app for university students
Description: |-
  Poziomki is a student social app focused on matching by shared interests and getting people into local events.

  The Android app includes:

  * profile creation with university-focused visibility controls
  * event discovery and creation
  * direct messaging
  * local profile and event recommendations
  * account export and deletion tools

  Distribution notes:

  * canonical binaries are published on GitHub Releases
  * the public privacy policy lives at https://poziomki.app/privacy
  * the public terms and moderation rules live at https://poziomki.app/terms
