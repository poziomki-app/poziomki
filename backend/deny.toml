[advisories]
version = 2
ignore = [
    # RUSTSEC-2023-0071: Marvin timing side-channel in the `rsa` crate
    # (pulled in transitively by lettre for SMTP). Exploitation requires an
    # attacker able to observe RSA signing timing over the network — which
    # applies to servers exposing RSA endpoints, not an SMTP *client*
    # performing TLS to a trusted provider. No patched `rsa` release
    # exists; re-evaluate when RustCrypto/RSA lands constant-time fixes
    # or when lettre drops the rsa dependency.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0097: rand 0.8 is unsound when a custom logger calls
    # `rand::rng()`. We do not install a custom logger that calls into rand,
    # and the dependency is only transitively pulled in by lettre → rsa →
    # num-bigint-dig for email crypto. Re-evaluate when lettre ships an
    # update that no longer depends on rand 0.8.
    "RUSTSEC-2026-0097",
    # RUSTSEC-2024-0436: paste 1.0.15 is archived / unmaintained. Pulled in
    # transitively by tokenizers via macro_rules_attribute — a proc-macro
    # helper used at build time only, no runtime code path. No CVE, no
    # observable behaviour; upstream tokenizers has no direct replacement
    # path. Re-evaluate when tokenizers or macro_rules_attribute migrates
    # off paste (likely to `pastey`).
    "RUSTSEC-2024-0436",
    # RUSTSEC-2026-0138: diesel-async 0.8 unsoundness when serializing
    # date/time values via the **Mysql** backend (cast over a `#[repr(C)]`
    # struct exposes padding bytes). We only enable the Postgres backend
    # (`diesel-async = { features = ["postgres", "deadpool"] }`), so the
    # affected code path is not compiled. Drop this ignore when we bump
    # diesel-async to >=0.9.
    "RUSTSEC-2026-0138",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "poziomki-backend"
expression = "MIT"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
