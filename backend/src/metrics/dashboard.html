<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>poziomki obs</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#c9d1d9;font-family:system-ui,-apple-system,sans-serif;padding:16px}
h1{font-size:18px;font-weight:600;margin-bottom:12px;color:#e6edf3}
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.toolbar .status{margin-left:auto;font-size:12px;color:#8b949e}
.range-btn{background:#1a1d27;border:1px solid #2a2d37;color:#c9d1d9;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:13px}
.range-btn:hover{background:#2a2d37}
.range-btn.active{background:#2f81f7;border-color:#2f81f7;color:#fff}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.card{background:#1a1d27;border:1px solid #2a2d37;border-radius:8px;padding:12px}
.card-title{font-size:13px;font-weight:600;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.chart-wrap{width:100%;overflow:hidden}
.u-legend{font-size:11px!important}
.u-legend th{color:#8b949e!important}
.u-legend td{color:#c9d1d9!important}
.u-series .u-marker{border-radius:2px!important}
</style>
</head>
<body>
<div class="toolbar">
  <h1>poziomki obs</h1>
  <button class="range-btn active" data-range="1h">1h</button>
  <button class="range-btn" data-range="6h">6h</button>
  <button class="range-btn" data-range="24h">24h</button>
  <span class="status" id="status">connecting...</span>
</div>
<div class="grid" id="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/uplot@1.6.31/dist/uPlot.iife.min.js"></script>
<script>
(function(){
  const token = new URLSearchParams(location.search).get('token') || '';
  let range = '1h';
  let charts = [];
  const grid = document.getElementById('grid');
  const status = document.getElementById('status');

  const COLORS = [
    '#2f81f7','#f0883e','#a371f7','#3fb950','#f778ba',
    '#79c0ff','#d29922','#ff7b72','#56d364','#bc8cff'
  ];

  const FILL_ALPHA = '18';

  function makeOpts(label, seriesNames, width) {
    const series = [{ label: 'Time' }];
    seriesNames.forEach((name, i) => {
      const color = COLORS[i % COLORS.length];
      series.push({
        label: name,
        stroke: color,
        width: 1.5,
        fill: color + FILL_ALPHA,
        points: { show: false },
      });
    });

    return {
      width: width,
      height: 200,
      series: series,
      axes: [
        {
          stroke: '#484f58',
          grid: { stroke: '#21262d', width: 1 },
          ticks: { stroke: '#21262d', width: 1 },
          font: '11px system-ui',
          values: (u, vals) => vals.map(v => {
            if (v == null) return '';
            const d = new Date(v * 1000);
            return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
          }),
        },
        {
          stroke: '#484f58',
          grid: { stroke: '#21262d', width: 1 },
          ticks: { stroke: '#21262d', width: 1 },
          font: '11px system-ui',
          size: 50,
        }
      ],
      cursor: {
        drag: { x: false, y: false },
      },
      legend: { live: true },
      padding: [8, 8, 0, 0],
    };
  }

  function chartWidth() {
    const card = document.querySelector('.card');
    if (card) return card.clientWidth - 24;
    return (grid.clientWidth / 2) - 36;
  }

  function buildCharts(data) {
    grid.innerHTML = '';
    charts = [];
    const w = chartWidth();

    data.charts.forEach(chart => {
      const card = document.createElement('div');
      card.className = 'card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = chart.label;
      card.appendChild(title);

      const wrap = document.createElement('div');
      wrap.className = 'chart-wrap';
      card.appendChild(wrap);
      grid.appendChild(card);

      const seriesNames = chart.series.map(s => s.name);
      const opts = makeOpts(chart.label, seriesNames, w);

      // Build uPlot data: [timestamps, ...values]
      const timestamps = chart.series.length > 0 && chart.series[0].timestamps.length > 0
        ? chart.series[0].timestamps
        : [0];
      const uData = [timestamps];
      chart.series.forEach(s => {
        uData.push(s.values.length > 0 ? s.values : [null]);
      });

      const uplot = new uPlot(opts, uData, wrap);
      charts.push({ uplot, wrap, label: chart.label });
    });
  }

  function updateCharts(data) {
    data.charts.forEach((chart, idx) => {
      const entry = charts[idx];
      if (!entry) return;
      const timestamps = chart.series.length > 0 && chart.series[0].timestamps.length > 0
        ? chart.series[0].timestamps
        : [0];
      const uData = [timestamps];
      chart.series.forEach(s => {
        uData.push(s.values.length > 0 ? s.values : [null]);
      });
      entry.uplot.setData(uData);
    });
  }

  async function fetchMetrics() {
    try {
      const resp = await fetch('/api/v1/metrics?range=' + range, {
        headers: { 'x-ops-token': token }
      });
      if (!resp.ok) {
        status.textContent = 'error: ' + resp.status;
        return null;
      }
      status.textContent = 'last update: ' + new Date().toLocaleTimeString();
      return await resp.json();
    } catch(e) {
      status.textContent = 'fetch error';
      return null;
    }
  }

  async function refresh() {
    const data = await fetchMetrics();
    if (!data) return;
    if (charts.length === 0) {
      buildCharts(data);
    } else {
      updateCharts(data);
    }
  }

  // Range buttons
  document.querySelectorAll('.range-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      range = btn.dataset.range;
      charts = [];
      refresh();
    });
  });

  // Resize handler
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      charts = [];
      refresh();
    }, 250);
  });

  // Initial load + auto-refresh
  refresh();
  setInterval(refresh, 10000);
})();
</script>
</body>
</html>
