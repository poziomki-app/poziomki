name: Deploy (prod)

# Dormant until the `production` environment + Tailscale OAuth secrets are
# configured. See infra/README.md "CI setup checklist".
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v0.19.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment:
      name: production
      url: https://api.poziomki.app
    timeout-minutes: 15

    # All untrusted inputs flow through env: so they cannot be interpreted
    # as shell syntax. Never interpolate ${{ inputs.* }} or ${{ github.event.* }}
    # directly inside a run: block — that's a shell-injection primitive.
    env:
      INPUT_TAG: ${{ inputs.tag }}
      IMAGE: ghcr.io/poziomki-app/poziomki-backend
      VPS_HOST: ${{ secrets.VPS_HOSTNAME }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-deployer

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        # cosign-installer@v4 is required to install cosign v3.x binaries;
        # @v3 bootstraps via cosign v2.5 which can't verify v3.x signatures.
        # cosign v3.0+ reads signatures via the OCI 1.1 referrers API that
        # our publish workflow uses. v2.x only looks at legacy `.sig` tags.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Resolve digest from GHCR
        id: d
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            "$IMAGE:$INPUT_TAG" \
            --format '{{json .Manifest}}' | jq -r .digest)
          test -n "$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Verify signature (gate)
        env:
          DIGEST: ${{ steps.d.outputs.digest }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/poziomki-app/poziomki/.github/workflows/backend-image.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}@${DIGEST}" > /dev/null
          echo "Signature verified for ${IMAGE}@${DIGEST}"

      - name: Apply on VPS
        env:
          DIGEST: ${{ steps.d.outputs.digest }}
          COMMIT_SHA: ${{ github.sha }}
        # StrictHostKeyChecking=accept-new is TOFU on first connection; safe
        # over a tailnet that restricts `tag:ci-deployer` to SSH only
        # `tag:poziomki-vps`. Replace with pre-seeded known_hosts once
        # Tailscale SSH tag-based auth lands.
        run: |
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${VPS_HOST}" \
            "set -e; cd ~/poziomki-rs && git fetch --quiet && \
             git checkout '$COMMIT_SHA' -- . ':!infra/.env*' ':!infra/garage/garage.toml' && \
             ./infra/scripts/deploy.sh prod '$IMAGE@$DIGEST'"

      - name: Health check
        # Recreate window can stretch past 60s under caddy reload + R8
        # warm-up. Old loop (30 × 2s = 60s) tripped on the transient 403
        # window every time, marking otherwise-successful deploys red.
        # 5 min total with a small initial sleep is enough headroom.
        run: |
          sleep 8
          attempts=90
          for i in $(seq 1 $attempts); do
            if curl -fsS --max-time 5 https://api.poziomki.app/health; then
              echo
              echo "Health OK after ${i} attempt(s)"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed after $((attempts*3))s"
          exit 1

      - name: Rollback on failure
        if: failure()
        # Best-effort: never let rollback exit non-zero — the deploy has
        # already failed and the workflow status is what the user sees.
        # If .env.prev points at an image that's no longer pullable (rare
        # but happens after secret rotations), do not compound the error.
        # StrictHostKeyChecking=accept-new also set here so rollback
        # cannot block on an interactive host key prompt if this is the
        # first SSH contact from the runner.
        run: |
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${VPS_HOST}" bash <<'REMOTE' || true
          cd ~/poziomki-rs/infra
          if [ ! -f .env.prev ]; then
            echo "rollback: no .env.prev — nothing to restore"
            exit 0
          fi
          mv .env.prev .env
          docker compose -p poziomki-rs --env-file .env -f docker-compose.prod.yml pull api worker || \
            echo "rollback: pull failed (image may be gone) — leaving current container in place"
          docker compose -p poziomki-rs --env-file .env -f docker-compose.prod.yml up -d --no-build || \
            echo "rollback: compose up failed — manual intervention needed"
          REMOTE
