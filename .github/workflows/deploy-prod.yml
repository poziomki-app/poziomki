name: Deploy (prod)

# Dormant until the `production` environment + secrets are configured.
# See README.md "CI setup checklist".
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. v0.19.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.poziomki.app
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-deployer

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Resolve digest from GHCR
        id: d
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            ghcr.io/poziomki-app/poziomki-backend:${{ inputs.tag }} \
            --format '{{json .Manifest}}' | jq -r .digest)
          test -n "$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Verify signature (gate)
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/poziomki-app/poziomki/.github/workflows/backend-image.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ghcr.io/poziomki-app/poziomki-backend@${{ steps.d.outputs.digest }}

      - name: Apply on VPS
        run: |
          ssh -o StrictHostKeyChecking=accept-new admin@poziomki \
            "cd ~/infra && git fetch && git checkout ${{ github.sha }} -- ':!.env' ':!.env.staging' \
             && ./scripts/deploy.sh prod ghcr.io/poziomki-app/poziomki-backend@${{ steps.d.outputs.digest }}"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://api.poziomki.app/healthz; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          ssh admin@poziomki \
            "cd ~/infra && mv .env.prev .env \
             && docker compose -p poziomki-rs --env-file .env -f docker-compose.prod.yml pull api worker \
             && docker compose -p poziomki-rs --env-file .env -f docker-compose.prod.yml up -d --no-build"
