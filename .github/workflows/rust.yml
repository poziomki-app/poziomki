name: Rust CI

on:
  pull_request:
    paths: [backend/**]

env:
  DATABASE_URL: postgres://poziomki:poziomki@localhost:5432/poziomki_test
  JWT_SECRET: ci-test-secret

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: poziomki
          POSTGRES_PASSWORD: poziomki
          POSTGRES_DB: poziomki_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poziomki"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libpq-dev libwebp-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets
