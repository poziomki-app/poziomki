name: Rust CI

on:
  pull_request:
    paths: [backend/**]

env:
  DATABASE_URL: postgres://poziomki:poziomki@localhost:5432/poziomki_test
  JWT_SECRET: ci-test-secret
  GARAGE_S3_ENDPOINT: http://localhost:9000
  GARAGE_S3_BUCKET: test-uploads
  GARAGE_S3_ACCESS_KEY: minioadmin
  GARAGE_S3_SECRET_KEY: minioadmin
  GARAGE_S3_REGION: us-east-1

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: poziomki
          POSTGRES_PASSWORD: poziomki
          POSTGRES_DB: poziomki_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poziomki"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libpq-dev libwebp-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Start MinIO
        working-directory: .
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 1
          done
          curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /tmp/mc && chmod +x /tmp/mc
          /tmp/mc alias set local http://localhost:9000 minioadmin minioadmin
          /tmp/mc mb local/test-uploads

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - run: cargo nextest run --all-targets

  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  deny:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check

  coverage:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: poziomki
          POSTGRES_PASSWORD: poziomki
          POSTGRES_DB: poziomki_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U poziomki"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libpq-dev libwebp-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - run: cargo tarpaulin --out xml --skip-clean --lib --bins

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: backend/cobertura.xml
          fail_ci_if_error: false
