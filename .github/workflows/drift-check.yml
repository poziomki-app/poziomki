name: Drift check

# Nightly: verify the VPS working tree matches origin/main.
# Alerts to ntfy on drift. Dormant until Tailscale secrets are configured.
on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5

    steps:
      - uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-deployer

      - name: Check VPS tree
        id: check
        run: |
          ssh -o StrictHostKeyChecking=accept-new ubuntu@poziomki \
            "cd ~/poziomki-rs/infra && ./scripts/drift-check.sh" | tee /tmp/drift.log
        continue-on-error: true

      - name: Alert on drift
        if: steps.check.outcome == 'failure'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          curl -fsS -d "infra drift detected on VPS — see GHA run $RUN_ID" \
            https://ntfy.poziomki.app/poziomki-dev
          exit 1
