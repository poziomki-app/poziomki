name: CodeQL

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# CodeQL only runs on the weekly schedule (Mon 06:00 UTC) and on-demand
# via workflow_dispatch. PRs and main pushes don't wait on it — findings
# surface in the Security tab within a week of landing on main, which is
# the right tradeoff for a small team: keeps coverage on shipped code
# without paying ~4 min on every push.

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # CodeQL 2.25+ uses source-only extraction for Rust — `build-mode: none`
          # (no cargo build needed). The manual mode was deprecated upstream.
          - language: rust
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql-config.yml

      # Kotlin/Java: gradle must actually invoke kotlinc so CodeQL's trace
      # wrapper can see it. If everything comes from the task build cache
      # (FROM-CACHE / UP-TO-DATE) CodeQL sees zero compilation and fails
      # with "no source code seen". `--no-build-cache --rerun-tasks` forces
      # real recompilation. Dep cache (gradle home) is still used for speed.
      - name: JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle cache
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true
      - name: Build mobile
        if: matrix.language == 'java-kotlin'
        working-directory: mobile
        run: ./gradlew :androidApp:assembleDebug --no-daemon --no-build-cache --rerun-tasks

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
