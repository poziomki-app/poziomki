name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # CodeQL 2.25+ uses source-only extraction for Rust — `build-mode: none`
          # (no cargo build needed). The manual mode was deprecated upstream.
          - language: rust
            build-mode: none
          - language: java-kotlin
            build-mode: manual

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: .github/codeql-config.yml

      # Kotlin/Java: gradle produces the JAR / class files CodeQL reads.
      - name: JDK 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Gradle cache
        if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4
      - name: Build mobile
        if: matrix.language == 'java-kotlin'
        working-directory: mobile
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
