name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v0.18.1
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Validate tag matches versionName
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          version_name="$(sed -n 's/.*appVersionName = "\(.*\)".*/\1/p' mobile/androidApp/build.gradle.kts | head -n1)"
          if [[ -z "$version_name" ]]; then
            echo "Could not read appVersionName" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${INPUT_TAG_NAME}"
            if [[ -z "$release_tag" ]]; then
              release_tag="v${version_name}"
            fi
          else
            release_tag="${GITHUB_REF_NAME}"
          fi
          if [[ "$release_tag" != "v${version_name}" ]]; then
            echo "Release tag ${release_tag} does not match versionName ${version_name}" >&2
            exit 1
          fi
          echo "VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Decode Android signing key
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          if [[ -z "${ANDROID_RELEASE_KEYSTORE_B64}" ]]; then
            echo "ANDROID_RELEASE_KEYSTORE_B64 is not configured" >&2
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/android-release.jks"

      - name: Build signed Android release
        working-directory: mobile
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          ./gradlew \
            :androidApp:lintRelease \
            :androidApp:assembleRelease \
            :androidApp:bundleRelease \
            -PreleaseStoreFile="$RUNNER_TEMP/android-release.jks" \
            -PreleaseStorePassword="$RELEASE_STORE_PASSWORD" \
            -PreleaseKeyAlias="$RELEASE_KEY_ALIAS" \
            -PreleaseKeyPassword="$RELEASE_KEY_PASSWORD"

      - name: Prepare release assets
        run: bash scripts/prepare_android_release.sh

      - name: Upload GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/android-release/*.apk
            dist/android-release/*.aab
            dist/android-release/*.txt
            dist/android-release/*.tar.gz
