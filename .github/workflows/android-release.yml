name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to publish, for example v0.18.1
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Validate tag matches versionName
        env:
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
        run: |
          version_name="$(sed -n 's/.*appVersionName = "\(.*\)".*/\1/p' mobile/androidApp/build.gradle.kts | head -n1)"
          if [[ -z "$version_name" ]]; then
            echo "Could not read appVersionName" >&2
            exit 1
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${INPUT_TAG_NAME}"
            if [[ -z "$release_tag" ]]; then
              release_tag="v${version_name}"
            fi
          else
            release_tag="${GITHUB_REF_NAME}"
          fi
          if [[ "$release_tag" != "v${version_name}" ]]; then
            echo "Release tag ${release_tag} does not match versionName ${version_name}" >&2
            exit 1
          fi
          echo "VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"

      - name: Decode Android signing key
        env:
          ANDROID_RELEASE_KEYSTORE_B64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_B64 }}
        run: |
          if [[ -z "${ANDROID_RELEASE_KEYSTORE_B64}" ]]; then
            echo "ANDROID_RELEASE_KEYSTORE_B64 is not configured" >&2
            exit 1
          fi
          echo "$ANDROID_RELEASE_KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/android-release.jks"

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        # Release builds MUST use the real Firebase config. No stub fallback:
        # a stub builds successfully but ships an invalid API key, so Firebase
        # init throws on first launch and Crashlytics can't even report the
        # crash (it depends on the same config). PR builds use mobile.yml's
        # explicit stub for debug-only assembly.
        run: |
          if [[ -z "${GOOGLE_SERVICES_JSON_B64}" ]]; then
            echo "::error::GOOGLE_SERVICES_JSON_B64 secret is not set; refusing to build a release with a stub Firebase config" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > mobile/androidApp/google-services.json
          # Guard against an empty/corrupt secret, or someone base64-ing the
          # .sample file by mistake. Both produce builds that crash on init.
          if ! jq -e '.client[0].api_key[0].current_key' mobile/androidApp/google-services.json >/dev/null; then
            echo "::error::google-services.json is missing api_key after decode" >&2
            exit 1
          fi
          api_key="$(jq -r '.client[0].api_key[0].current_key' mobile/androidApp/google-services.json)"
          project_id="$(jq -r '.project_info.project_id' mobile/androidApp/google-services.json)"
          package_name="$(jq -r '.client[0].client_info.android_client_info.package_name' mobile/androidApp/google-services.json)"
          if [[ "$api_key" == "REPLACE_ME" || "$project_id" == "your-firebase-project-id" ]]; then
            echo "::error::GOOGLE_SERVICES_JSON_B64 decodes to the .sample stub; configure the real Firebase config" >&2
            exit 1
          fi
          if [[ "$package_name" != "app.poziomki" ]]; then
            echo "::error::google-services.json package_name is '$package_name', expected 'app.poziomki'" >&2
            exit 1
          fi

      - name: Build signed Android release
        working-directory: mobile
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          common_args=(
            -PreleaseStoreFile="$RUNNER_TEMP/android-release.jks"
            -PreleaseStorePassword="$RELEASE_STORE_PASSWORD"
            -PreleaseKeyAlias="$RELEASE_KEY_ALIAS"
            -PreleaseKeyPassword="$RELEASE_KEY_PASSWORD"
          )
          # APKs (with ABI splits) for sideload + GitHub release.
          # Lint is skipped here — CI's newer Android SDK emits checks that
          # local builds don't (GradleDependency, LockedOrientationActivity,
          # etc.) and locally-passing baselines drift. The Mobile CI workflow
          # (mobile.yml) still gates lint on every PR, so quality is covered.
          ./gradlew :androidApp:assembleRelease -x lintRelease -x lintVitalRelease "${common_args[@]}"
          # Play AAB — splits must be off for the same invocation
          # (issuetracker.google.com/402800800).
          ./gradlew :androidApp:bundleRelease -PnoAbiSplits=true -x lintRelease -x lintVitalRelease "${common_args[@]}"

      - name: Prepare release assets
        run: bash scripts/prepare_android_release.sh

      - name: Upload GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dist/android-release/*.apk
            dist/android-release/*.aab
            dist/android-release/*.txt
            dist/android-release/*.tar.gz

      # Probe for the Play service-account secret so the upload step can be
      # cleanly skipped (instead of failing the whole release) when CI runs
      # before the secret has been provisioned. See docs/play-deploy.md.
      - name: Check Play upload secret
        id: play_secret
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [[ -n "${PLAY_SERVICE_ACCOUNT_JSON}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::PLAY_SERVICE_ACCOUNT_JSON not configured; skipping Play upload. See docs/play-deploy.md." >&2
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Auto-publish the signed AAB to Play Console's internal testing
      # track. First-ever upload still has to be done manually via the
      # Console (Google's bootstrap requirement); subsequent tag pushes
      # ship automatically. See docs/play-deploy.md for setup.
      - name: Upload AAB to Play internal track
        if: steps.play_secret.outputs.present == 'true'
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: app.poziomki
          releaseFiles: dist/android-release/*.aab
          track: internal
          status: completed
