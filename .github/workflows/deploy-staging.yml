name: Deploy (staging)

# Triggered manually from Actions → Deploy (staging). The `staging`
# environment has no required reviewer and no wait timer, so a dispatch
# here runs as soon as it's queued. Default tag is `main` — use a
# specific `vX.Y.Z` if you want to pin staging to a prior build.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: main)"
        required: false
        default: "main"
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging-api.poziomki.app
    timeout-minutes: 10

    env:
      INPUT_TAG: ${{ inputs.tag }}
      IMAGE: ghcr.io/poziomki-app/poziomki-backend
      VPS_HOST: ${{ secrets.VPS_HOSTNAME }}

    steps:
      - uses: actions/checkout@v4

      - uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci-deployer

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Resolve digest from GHCR
        id: d
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            "$IMAGE:$INPUT_TAG" \
            --format '{{json .Manifest}}' | jq -r .digest)
          test -n "$DIGEST"
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Verify signature (gate)
        env:
          DIGEST: ${{ steps.d.outputs.digest }}
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/poziomki-app/poziomki/.github/workflows/backend-image.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${IMAGE}@${DIGEST}" > /dev/null
          echo "Signature verified for ${IMAGE}@${DIGEST}"

      - name: Apply on VPS
        env:
          DIGEST: ${{ steps.d.outputs.digest }}
          COMMIT_SHA: ${{ github.sha }}
        # Staging lives in its own checkout (~/poziomki-rs-staging) so that
        # a staging deploy never advances the prod worktree's infra files.
        # Prod and staging each pin their own commit independently.
        run: |
          ssh -o StrictHostKeyChecking=accept-new "ubuntu@${VPS_HOST}" \
            "set -e; cd ~/poziomki-rs-staging && git fetch --quiet && \
             git checkout '$COMMIT_SHA' -- . ':!infra/.env*' ':!infra/garage/garage.toml' && \
             ./infra/scripts/deploy.sh staging '$IMAGE@$DIGEST'"

      - name: Health check
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://staging-api.poziomki.app/health; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Rollback on failure
        if: failure()
        # Guarded: .env.staging.prev only exists once deploy.sh runs far
        # enough to snapshot it. Failing earlier (cosign, SSH, digest
        # resolve) would otherwise hide the real error behind a secondary
        # `mv: no such file`.
        run: |
          ssh "ubuntu@${VPS_HOST}" \
            "cd ~/poziomki-rs-staging/infra && \
             if [ ! -f .env.staging.prev ]; then \
               echo 'rollback: no .env.staging.prev — nothing to restore'; exit 0; \
             fi; \
             set -e; mv .env.staging.prev .env.staging && \
             docker compose -p poziomki-rs-staging --env-file .env.staging -f docker-compose.staging.yml pull api worker && \
             docker compose -p poziomki-rs-staging --env-file .env.staging -f docker-compose.staging.yml up -d --no-build"
