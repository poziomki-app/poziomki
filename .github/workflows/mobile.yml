name: Mobile CI

on:
  pull_request:
    paths: [mobile/**]
  schedule:
    # Weekly dependency-update report. Monday 06:00 UTC avoids overlapping
    # with backend security audit (Sunday) and keeps the report fresh at
    # the start of the work week.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: blacksmith-4vcpu-ubuntu-2404

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Stub google-services.json for CI
        run: cp androidApp/google-services.json.sample androidApp/google-services.json

      # One gradle invocation: assembleDebug + detekt + ktlintCheck.
      # Single Kotlin daemon + parallel tasks = ~30s saved vs. running
      # three separate gradlew commands.
      - run: ./gradlew :androidApp:assembleDebug detekt ktlintCheck --parallel

      # Upload debug APK on PR runs so the trusted pr-apk-comment workflow
      # can surface a download link back on the PR. Fork PRs run this step
      # with a read-only token — no secrets exposed.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name == 'pull_request'
        with:
          name: debug-apk-${{ github.run_id }}
          path: mobile/androidApp/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

  dependency-updates:
    # Only runs on the weekly schedule and manual dispatch — pull-request
    # runs skip it to avoid gating merges on an upstream version bump we
    # haven't had time to triage.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - run: ./gradlew dependencyUpdates -Drevision=release

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: gradle-dependency-updates
          path: mobile/build/dependencyUpdates/
          retention-days: 30
