name: Mobile CI

on:
  pull_request:
    paths: [mobile/**]
  schedule:
    # Weekly dependency-update report. Monday 06:00 UTC avoids overlapping
    # with backend security audit (Sunday) and keeps the report fresh at
    # the start of the work week.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mobile-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - run: ./gradlew :androidApp:assembleDebug

      # Upload debug APK on PR runs so the trusted pr-apk-comment workflow
      # can surface a download link back on the PR. Fork PRs run this step
      # with a read-only token — no secrets exposed.
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name == 'pull_request'
        with:
          name: debug-apk-${{ github.run_id }}
          path: mobile/androidApp/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

  lint:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - run: ./gradlew detekt
      - run: ./gradlew ktlintCheck

  dependency-updates:
    # Only runs on the weekly schedule and manual dispatch — pull-request
    # runs skip it to avoid gating merges on an upstream version bump we
    # haven't had time to triage.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - run: ./gradlew dependencyUpdates -Drevision=release

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: gradle-dependency-updates
          path: mobile/build/dependencyUpdates/
          retention-days: 30
