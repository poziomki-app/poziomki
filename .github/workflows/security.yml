name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

# Top-level perms are the minimum. Scorecard's webapp publisher rejects
# uploads when workflow-level `security-events: write` is set — see the
# "workflow-restrictions" section of ossf/scorecard-action. Jobs that need
# to upload SARIF override with their own `permissions:` block.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Trivy — only the `config` scan here. The `fs` scan was removed: for
  # Rust, cargo-deny (below) covers RUSTSEC + license + ban policy more
  # actionably; for mobile, there's no gradle.lockfile so fs scans
  # produced near-zero signal. We keep `config` because Hadolint doesn't
  # catch compose/k8s/terraform misconfigs that Trivy does.
  trivy:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Trivy
        env:
          TRIVY_VERSION: "0.70.0"
        run: |
          curl -sSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz trivy
          chmod +x trivy
          ./trivy --version
      - name: Scan repo config (Dockerfiles, compose, workflows)
        run: ./trivy config . --severity MEDIUM,HIGH,CRITICAL --format sarif --output trivy-config.sarif --exit-code 0
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  cargo-deny:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2
        with:
          manifest-path: backend/Cargo.toml
          command: check advisories licenses bans sources
          arguments: ""

  # gitleaks — secret detection. Installs the CLI directly (the
  # gitleaks-action marketplace variant has been unreliable) and uploads
  # SARIF to the Security tab.
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GL_VERSION: "8.21.2"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks
      - name: Scan repo
        run: ./gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --exit-code 0
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  # Dependency Review — blocks PRs that introduce vulnerable or GPL-licensed
  # dependencies. Only fires on pull_request. Pinned to a specific release
  # (floating `@v4` has 404'd on stale SHAs before).
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: AGPL-1.0, AGPL-3.0, GPL-2.0, GPL-3.0

  # Hadolint — Dockerfile best-practice + security linter, SARIF to Security tab.
  hadolint:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true
          format: sarif
          output-file: hadolint.sarif
          no-fail: true
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: hadolint.sarif
          category: hadolint

  # Actionlint — catches common mistakes in .github/workflows YAMLs
  # (shellcheck integration, expression errors, deprecated actions).
  # Uses reviewdog so findings appear inline on the PR; actionlint has no
  # native SARIF output, so we skip the Security-tab upload for this one.
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          level: warning
          fail_level: error

  # OSSF Scorecard — open-source supply-chain health score (branch protection,
  # pinned deps, token permissions, etc.). Runs on schedule + default-branch
  # pushes; results flow to the Security tab.
  scorecard:
    if: github.event_name == 'schedule' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true
      - uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: scorecard
