name: PR Size

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const { additions, deletions } = context.payload.pull_request;
            const total = additions + deletions;

            const sizes = [
              { label: 'size/xs',  max: 10 },
              { label: 'size/s',   max: 50 },
              { label: 'size/m',   max: 200 },
              { label: 'size/l',   max: 500 },
              { label: 'size/xl',  max: 1000 },
              { label: 'size/xxl', max: Infinity },
            ];

            const size = sizes.find(s => total <= s.max);
            const allLabels = sizes.map(s => s.label);
            const current = context.payload.pull_request.labels
              .map(l => l.name)
              .filter(n => allLabels.includes(n));

            // Remove stale size labels
            for (const old of current) {
              if (old !== size.label) {
                await github.rest.issues.removeLabel({
                  ...context.repo,
                  issue_number: context.issue.number,
                  name: old,
                });
              }
            }

            // Add correct label
            if (!current.includes(size.label)) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.issue.number,
                labels: [size.label],
              });
            }
